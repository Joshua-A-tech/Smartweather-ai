services:
  - type: web
    name: smartweather-ai-backend
    runtime: python
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HIVEMQ_HOST
        sync: false
      - key: HIVEMQ_USERNAME
        sync: false
      - key: HIVEMQ_PASSWORD
        sync: false
