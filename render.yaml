services:
  - type: web
    name: smartweather-ai-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HIVEMQ_HOST
        sync: false
      - key: HIVEMQ_PORT
        sync: false
      - key: HIVEMQ_USERNAME
        sync: false
      - key: HIVEMQ_PASSWORD
        sync: false
      - key: MQTT_TOPIC
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
